name: Deploy backend to HF Space

on:
  push:
    branches: [main]
    paths:
      - "backend/**"

jobs:
  sync-to-hf:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Setup Git
        run: |
          git config --global user.email "ci-bot@github.com"
          git config --global user.name "GitHub CI"

      - name: Push backend to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd backend

          # Ignorar binarios que HF rechaza en push normal
          # (las fuentes las descarga el Dockerfile con wget)
          echo "assets/fonts/" >> .gitignore
          echo "*.ttf" >> .gitignore
          echo "*.otf" >> .gitignore
          echo "*.woff" >> .gitignore
          echo "*.woff2" >> .gitignore

          git init
          git remote add hf https://Camilo723:$HF_TOKEN@huggingface.co/spaces/Camilo723/kumon-backend
          git add .
          git commit -m "deploy: ${{ github.sha }}"
          git push hf HEAD:main --force